<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>{{ titulo }}</h1>

    {% if erro %}
    <p class="erro">{{ erro }}</p>
    {% endif %}

    <form method="POST"
          action="{% if aluno_id %}{{ url_for('editar', aluno_id=aluno_id) }}{% else %}{{ url_for('cadastrar') }}{% endif %}">
        <div class="form-grupo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required value="{{ nome or '' }}">
        </div>
        <div class="form-grupo">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required value="{{ email or '' }}">
        </div>
        <button type="submit">Salvar</button>
    </form>

    <p><a href="{{ url_for('index') }}">← Voltar à lista</a></p>

</body>
</html>
