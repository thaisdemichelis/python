<!DOCTYPE html>

<head>

    <title>Currículo</title>
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
    color: #333;
    background-color: #f9f9f9;
    padding: 40px 20px;
    max-width: 800px;
    margin: 0 auto;
    background-color: #ffffff;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    min-height: 100vh;
}

h1 {
    text-align: center;
    color: #2c3e50;
    font-size: 2.5rem;
    margin-bottom: 10px;
    border-bottom: 3px solid #3498db;
    padding-bottom: 10px;
}

h2 {
    color: #3498db;
    font-size: 1.4rem;
    margin-top: 30px;
    margin-bottom: 15px;
    border-left: 5px solid #3498db;
    padding-left: 12px;
}

ul {
    list-style: none;
    margin-bottom: 20px;
}

li {
    margin-bottom: 12px;
    font-size: 1.05rem;
}

strong {
    color: #2c3e50;
    width: 140px;
    display: inline-block;
}

@media (max-width: 600px) {
    body {
        padding: 20px 15px;
    }

    h1 {
        font-size: 2rem;
    }

    strong {
        width: 120px;
    }
}

li:hover {
    background-color: #f1f8ff;
    padding-left: 8px;
    transition: all 0.3s;
}
</style>
