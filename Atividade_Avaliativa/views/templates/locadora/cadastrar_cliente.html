{% extends "layout.html" %}
{% block title %}Novo Cliente{% endblock %}

{% block content %}
<h1>Cadastrar Novo Cliente</h1>

<form method="POST" action="{{ url_for('locadora.cadastrar_cliente') }}">
    <div class="form-grupo">
        <label>Nome Completo</label>
        <input type="text" name="nome" placeholder="Ex: João Silva" required>
    </div>
    
    <div class="form-grupo">
        <label>CPF</label>
        <input type="text" name="cpf" placeholder="Ex: 000.000.000-00" required>
    </div>
    
    <div class="form-grupo">
        <label>CNH</label>
        <input type="text" name="cnh" placeholder="Ex: 12345678900" required>
    </div>
    
    <button type="submit" style="background-color: #28a745;">Salvar Cliente</button>
</form>

<p><a href="{{ url_for('locadora.cadastrar') }}">← Cancelar e Voltar</a></p>
{% endblock %}
